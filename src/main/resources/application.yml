spring:
  datasource:
    mariadb:
      url: jdbc:mariadb://localhost:3306/app_db
      username: app_user
      password: app_pass
      driver-class-name: org.mariadb.jdbc.Driver

    oracle:
      url: jdbc:oracle:thin:@localhost:1521:XE
      username: system
      password: oracle
      driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true